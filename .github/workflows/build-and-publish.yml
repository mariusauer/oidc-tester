name: Build And Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          APP_NAME: oidc-tester
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}${{ matrix.binary_ext }}" .

      - name: Package archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          APP_NAME: oidc-tester
        run: |
          package_name="${APP_NAME}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${package_name}"
          cp "dist/${APP_NAME}${{ matrix.binary_ext }}" "dist/${package_name}/"

          if [ "${GOOS}" = "windows" ]; then
            cd dist
            zip -r "${package_name}.zip" "${package_name}" >/dev/null
          else
            tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: oidc-tester-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/oidc-tester_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten release assets
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
